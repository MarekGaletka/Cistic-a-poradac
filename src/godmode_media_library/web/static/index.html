<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="GOD MODE Media Library — spravce medii s durazem na metadata a bezpecnost">
  <title>GOD MODE Media Library</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" defer></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#content">Přeskočit na obsah</a>

  <!-- Top progress bar (non-blocking, YouTube-style) -->
  <div id="global-progress" class="global-progress hidden" role="progressbar" aria-label="Průběh úlohy" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100">
    <div class="global-progress-fill"></div>
  </div>

  <div class="app">
    <nav aria-label="Hlavní navigace" role="navigation">
      <div class="nav-header">
        <h1>GOD MODE</h1>
        <button class="nav-toggle" aria-label="Přepnout navigační menu" aria-expanded="false">&#9776;</button>
      </div>
      <div class="nav-links">
        <a href="#dashboard" class="active" data-page="dashboard" aria-current="page">
          <span class="nav-icon">&#127968;</span>
          <span class="nav-label">Přehled</span>
        </a>
        <a href="#files" data-page="files">
          <span class="nav-icon">&#128247;</span>
          <span class="nav-label">Soubory</span>
        </a>
        <a href="#duplicates" data-page="duplicates">
          <span class="nav-icon">&#128203;</span>
          <span class="nav-label">Duplicity</span>
          <span id="dup-badge" class="nav-badge hidden">0</span>
        </a>
        <a href="#similar" data-page="similar">
          <span class="nav-icon">&#127912;</span>
          <span class="nav-label">Podobné</span>
        </a>
        <a href="#timeline" data-page="timeline">
          <span class="nav-icon">&#128197;</span>
          <span class="nav-label">Časová osa</span>
        </a>
        <a href="#map" data-page="map">
          <span class="nav-icon">&#127758;</span>
          <span class="nav-label">Mapa</span>
        </a>
      </div>
      <div class="nav-bottom">
        <button id="btn-settings" class="nav-settings-btn" aria-label="Nastavení" title="Nastavení">
          <span class="nav-icon">&#9881;</span>
          <span class="nav-label">Nastavení</span>
        </button>
      </div>
    </nav>
    <main id="content" role="main" aria-live="polite">
      <div class="loading"><div class="spinner" role="status" aria-label="Načítání"></div>Načítání...</div>
    </main>
  </div>

  <!-- Floating action bar (selection) -->
  <div id="floating-action-bar" class="floating-action-bar hidden" role="toolbar" aria-label="Akce s vybranými soubory"></div>

  <!-- Settings panel (slide-out from right) -->
  <div id="settings-panel" class="settings-panel" aria-hidden="true" role="complementary" aria-label="Nastavení">
    <div class="settings-panel-header">
      <h3>Nastavení</h3>
      <button id="settings-panel-close" class="settings-panel-close" aria-label="Zavřít">&times;</button>
    </div>
    <div class="settings-panel-content" id="settings-panel-content">
      <!-- Pipeline + Doctor rendered here dynamically -->
    </div>
  </div>
  <div id="settings-overlay" class="settings-overlay hidden"></div>

  <!-- Folder picker modal -->
  <div id="folder-picker-overlay" class="folder-picker-overlay hidden" role="dialog" aria-label="Výběr složky" aria-hidden="true">
    <div class="folder-picker">
      <div class="folder-picker-header" id="folder-picker-header"></div>
      <div class="folder-picker-body">
        <div class="folder-picker-sidebar" id="folder-picker-sidebar"></div>
        <div class="folder-picker-main" id="folder-picker-main"></div>
      </div>
      <div class="folder-picker-footer" id="folder-picker-footer"></div>
    </div>
  </div>

  <!-- Lightbox (fullscreen image/video viewer) -->
  <div id="lightbox-overlay" class="lightbox-overlay hidden" role="dialog" aria-label="Prohlížeč" aria-hidden="true">
    <div class="lightbox-content" id="lightbox-content"></div>
  </div>

  <div id="toast-container" role="alert" aria-live="assertive"></div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
